<script>

    { value: "Sandra Zulkifli", text: "Sandra" },
    { value: "Sapto Kuncoro", text: "Sapto" },
    { value: "Slamet", text: "Slamet" },
    { value: "Sudarto", text: "Sudarto" },

let dataCuti = [];
let tampilkanCutiLama = false;

const nationalHolidays = {
    2026: {
        0: [ {day:1, name:"Tahun Baru 2026 Masehi"}, {day:16, name:"Isra Mikraj Nabi Muhammad SAW"} ],
        1: [ {day:17, name:"Tahun Baru Imlek 2577"} ],
        2: [ {day:19, name:"Hari Raya Nyepi"}, {day:21, name:"Hari Raya Idul Fitri"}, {day:22, name:"Hari Raya Idul Fitri"} ],
        3: [ {day:3, name:"Wafat Yesus Kristus"}, {day:5, name:"Hari Raya Paskah"} ],
        4: [ {day:1, name:"Hari Buruh Internasional"}, {day:14, name:"Kenaikan Isa Almasih"}, {day:27, name:"Hari Raya Idul Adha"}, {day:31, name:"Hari Raya Waisak"} ],
        5: [ {day:1, name:"Hari Lahir Pancasila"}, {day:16, name:"Tahun Baru Islam 1448 H"} ],
        7: [ {day:17, name:"Hari Kemerdekaan RI"}, {day:15, name:"Maulid Nabi Muhammad SAW"} ],
        11: [ {day:25, name:"Hari Raya Natal"} ]
    }
};

let currentMonth = new Date().getMonth();
let currentYear  = new Date().getFullYear();
const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const dayNamesIndo = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
const pasaranDays = ["Legi","Pahing","Pon","Wage","Kliwon"];
const refPasaranIdx = 2; 
async function loadDataCuti() {

    const snapshot = await fb.getDocs(
        fb.collection(db, "cuti")
    );

    dataCuti = [];

    snapshot.forEach((docSnap) => {

        dataCuti.push({
            id: docSnap.id,
            ...docSnap.data()
        });

    });

    renderCalendar(currentMonth, currentYear);
}

function inisialisasiForm() {
    // Isi Dropdown Personil Utama
    const selectEl = document.getElementById("personilCuti");
    selectEl.innerHTML = '<option value="">-- Pilih Personil --</option>';
    daftarPersonil.forEach(p => {
        const option = document.createElement("option");
        option.value = p.value;
        option.textContent = p.text;
        selectEl.appendChild(option);
    });

    // Buat Checklist Box untuk Long Shift 1 & 2
    buatChecklistBox("longShift1Container", "ls1");
    buatChecklistBox("longShift2Container", "ls2");
}

function buatChecklistBox(containerId, prefix) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    daftarPersonil.forEach((p, index) => {
        const label = document.createElement("label");
        label.className = "checkbox-item";
        
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.name = prefix;
        checkbox.value = p.text; // Menggunakan nama singkatan agar tidak terlalu panjang saat ditampilkan
        
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(p.text));
        container.appendChild(label);
    });
}

function getPasaran(date){
    const d = new Date(date);
    d.setHours(0,0,0,0);
    const diff = Math.floor((d - new Date(2026,0,1).setHours(0,0,0,0))/(1000*60*60*24));
    let idx = (refPasaranIdx + diff) % 5;
    if(idx<0) idx+=5;
    return pasaranDays[idx];
}

function formatTanggalIndonesia(dateObj) {
    const hari = dayNamesIndo[dateObj.getDay()];
    const tgl = dateObj.getDate();
    const bulan = monthNames[dateObj.getMonth()];
    const tahun = dateObj.getFullYear();
    return `${hari}, ${tgl} ${bulan} ${tahun}`;
}

function showDayDetailsPopup(dateStr, libur, cellDate) {
    const modalTitle = document.getElementById("modalTitle");
    const modalDetail = document.getElementById("modalDetail");
    const modalCutiContent = document.getElementById("modalCutiContent");

    modalTitle.innerText = "Pengganti Cuti";
    modalDetail.innerText = formatTanggalIndonesia(cellDate) + ` (${getPasaran(cellDate)})`;
    modalCutiContent.innerHTML = "";

    if (libur) {
        modalCutiContent.innerHTML += `
            <div class="detail-cuti-item" style="border-left-color: #d32f2f; background: #ffebee;">
                <strong style="color: #d32f2f;">Hari Libur Nasional:</strong><br>
                ${libur.name}
            </div>
        `;
    }

    // Ambil data cuti pada tanggal ini, sertakan index aslinya untuk fungsi hapus
    const personilCutiHariIni =
    dataCuti.filter(c => c.tanggal === dateStr);

    if (personilCutiHariIni.length > 0) {
        personilCutiHariIni.forEach(p => {
            modalCutiContent.innerHTML += `
                <div class="detail-cuti-item">
                    <div class="detail-row">
                        <span class="label">Personil Cuti</span>
                        <span class="separator">:</span>
                        <span class="value">${p.personil}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Long Shift 1</span>
                        <span class="separator">:</span>
                        <span class="value">${p.longShift1 || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Long Shift 2</span>
                        <span class="separator">:</span>
                        <span class="value">${p.longShift2 || '-'}</span>
                    </div>
                    <div style="text-align: right;">
                        <button class="btn-hapus" onclick="hapusCuti('${p.id}')">Hapus Cuti</button>
                    </div>
                </div>
            `;
        });
    } else if (!libur) {
        modalCutiContent.innerHTML += `<p style="text-align:center; color:#666; font-style:italic; margin-top:15px;">Tidak ada agenda cuti atau libur.</p>`;
    }

    document.getElementById("holidayModal").style.display = "flex";
}

// Fungsi Baru: Menghapus data cuti berdasarkan index array
async function hapusCuti(id) {

    if(confirm("Apakah Anda yakin ingin menghapus data cuti ini?")) {

        await fb.deleteDoc(
            fb.doc(db, "cuti", id)
        );

        await loadDataCuti();

        closeModal();
    }
} 

function closeModal() { document.getElementById("holidayModal").style.display = "none"; }

function renderCalendar(month, year, exitClass = ""){
    const table = document.getElementById("calendarTable");
    if(exitClass) {
        table.className = exitClass;
        setTimeout(() => {            
            updateTableContent(month, year);
            table.className = "stack-enter";
            table.offsetHeight; 
            table.className = "stack-active";
        }, 300);
    } else {
        updateTableContent(month, year);
    }
}

function updateTableContent(month, year) {
    document.getElementById("monthYearDisplay").innerText = `${monthNames[month]} ${year}`;
    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    let date = 1;
    for(let i=0; i<6; i++){
        const row = document.createElement("tr");
        let hasData = false;
        for(let j=0; j<7; j++){
            const cell = document.createElement("td");
            if((i===0 && j<firstDay) || date > daysInMonth){
                row.appendChild(cell);
            } else {
                hasData = true;
                const thisDate = new Date(year, month, date);
                if(j===0) cell.classList.add("sun");

                const cellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                const todayStr = new Date().toISOString().split("T")[0];

                const adaCuti = dataCuti.some(c => {
                    if (tampilkanCutiLama) {
                        return c.tanggal === cellDateStr;
                    }
                    return c.tanggal === cellDateStr && c.tanggal >= todayStr;
                });

                let libur = null;
                if(nationalHolidays[year] && nationalHolidays[year][month]){
                    libur = nationalHolidays[year][month].find(h => h.day === date);
                }

                if(date===today.getDate() && month===today.getMonth() && year===today.getFullYear()){
                    cell.classList.add("today-highlight");
                }

                if(adaCuti) {
                    cell.classList.add("leave-highlight");
                }

                if(libur) {
                    cell.classList.add("holiday");
                }

                cell.innerHTML = `<span class="date-num">${date}</span><div class="pasaran">${getPasaran(thisDate)}</div>`;
                cell.onclick = () => showDayDetailsPopup(cellDateStr, libur, thisDate);

                row.appendChild(cell);
                date++;
            }
        }
        if(hasData) tbody.appendChild(row);
    }
    renderHolidayList(month, year);
}

function renderHolidayList(month, year){
    const box = document.getElementById("holidaysList");
    box.innerHTML = "<strong>Hari Libur Nasional:</strong><br>";
    const list = (nationalHolidays[year] && nationalHolidays[year][month]) || [];
    if(list.length > 0){
        list.forEach(h => {
            box.innerHTML += `<div style="color: black; cursor:pointer; margin-top:3px;" onclick="showDayDetailsPopup('${year}-${String(month + 1).padStart(2, '0')}-${String(h.day).padStart(2, '0')}', ${JSON.stringify(h)}, new Date(${year}, ${month}, ${h.day}))">• ${h.day} ${monthNames[month]}: ${h.name}</div>`;
        });
    } else {
        box.innerHTML += "<em>Tidak ada libur nasional</em>";
    }
}

function changeMonth(dir){
    const exitAnim = dir > 0 ? "stack-exit-left" : "stack-exit-right";
    currentMonth += dir;
    if(currentMonth < 0){ currentMonth = 11; currentYear--; }
    if(currentMonth > 11){ currentMonth = 0; currentYear++; }
    renderCalendar(currentMonth, currentYear, exitAnim);
}

function changeYear(dir){
    currentYear += dir;
    renderCalendar(currentMonth, currentYear, "stack-enter");
}

function goToToday() {
    const now = new Date();
    if(currentMonth === now.getMonth() && currentYear === now.getFullYear()) return;
    currentMonth = now.getMonth();
    currentYear = now.getFullYear();
    renderCalendar(currentMonth, currentYear, "stack-enter");
}

function toggleCutiLama() {
    tampilkanCutiLama = !tampilkanCutiLama;
    const btn = document.getElementById("toggleBtn");
    if (tampilkanCutiLama) {
        btn.innerText = "📂";
        btn.title = "Sembunyikan cuti lama";
    } else {
        btn.innerText = "🕘";
        btn.title = "Tampilkan cuti lama";
    }
    renderCalendar(currentMonth, currentYear);
}

let startX = 0;
document.getElementById('swipeArea').addEventListener('touchstart', e => startX = e.touches[0].clientX);
document.getElementById('swipeArea').addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) changeMonth(diff > 0 ? 1 : -1);
});

// Jalankan inisialisasi
inisialisasiForm();
loadDataCuti();

function openPopup() { document.getElementById("popupForm").style.display = "flex"; }
function closeForm() { 
    document.getElementById("popupForm").style.display = "none"; 
    resetForm();
}

function resetForm() {
    document.getElementById("hariTglCuti").value = "";
    document.getElementById("personilCuti").value = "";
    
    // Uncheck semua checkbox long shift
    const checkboxes = document.querySelectorAll('#popupForm input[type="checkbox"]');
    checkboxes.forEach(cb => cb.checked = false);
}

async function simpanCuti() {

    const tanggal = document.getElementById("hariTglCuti").value;
    const personil = document.getElementById("personilCuti").value;

    const checkedLS1 = Array.from(
        document.querySelectorAll('input[name="ls1"]:checked')
    ).map(cb => cb.value);

    const checkedLS2 = Array.from(
        document.querySelectorAll('input[name="ls2"]:checked')
    ).map(cb => cb.value);

    if (!tanggal || !personil) {
        alert("⚠️ Data wajib diisi!");
        return;
    }

    await fb.addDoc(
        fb.collection(db, "cuti"),
        {
            tanggal,
            personil,
            longShift1: checkedLS1.length ? checkedLS1.join(', ') : '-',
            longShift2: checkedLS2.length ? checkedLS2.join(', ') : '-'
        }
    );

    await loadDataCuti();

    closeForm();
}
</script>
